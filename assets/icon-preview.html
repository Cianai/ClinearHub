<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClinearHub Avatars</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    gap: 80px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .icon-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }
  .icon-group h2 {
    color: #a1a1aa;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* === ClinearHub Code Icon === */
  .icon-code {
    width: 256px;
    height: 256px;
    border-radius: 56px;
    background: linear-gradient(145deg, #0f0d2e 0%, #1a1650 40%, #252066 100%);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow:
      0 0 0 1px rgba(129, 140, 248, 0.08),
      0 20px 60px rgba(0, 0, 0, 0.5),
      inset 0 1px 0 rgba(255, 255, 255, 0.05);
    overflow: hidden;
  }
  .icon-code::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 30% 20%, rgba(129, 140, 248, 0.12) 0%, transparent 50%);
    pointer-events: none;
  }
  .icon-code svg {
    width: 140px;
    height: 140px;
    position: relative;
    z-index: 1;
    filter: drop-shadow(0 2px 8px rgba(129, 140, 248, 0.3));
  }

  /* === ClinearHub Cowork Icon === */
  .icon-cowork {
    width: 256px;
    height: 256px;
    border-radius: 56px;
    background: linear-gradient(145deg, #2e1065 0%, #4c1d95 40%, #5b21b6 100%);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow:
      0 0 0 1px rgba(167, 139, 250, 0.1),
      0 20px 60px rgba(0, 0, 0, 0.5),
      inset 0 1px 0 rgba(255, 255, 255, 0.06);
    overflow: hidden;
  }
  .icon-cowork::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 70% 80%, rgba(196, 181, 253, 0.1) 0%, transparent 50%);
    pointer-events: none;
  }
  .icon-cowork svg {
    width: 150px;
    height: 150px;
    position: relative;
    z-index: 1;
    filter: drop-shadow(0 2px 8px rgba(167, 139, 250, 0.35));
  }
</style>
</head>
<body>

<div class="icon-group">
  <div class="icon-code">
    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Left bracket < -->
      <path d="M38 26L12 50L38 74" stroke="url(#codeGrad)" stroke-width="8.5" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Right bracket > -->
      <path d="M62 26L88 50L62 74" stroke="url(#codeGrad)" stroke-width="8.5" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Slash / -->
      <line x1="58" y1="20" x2="42" y2="80" stroke="url(#slashGrad)" stroke-width="7" stroke-linecap="round"/>
      <defs>
        <linearGradient id="codeGrad" x1="10" y1="28" x2="90" y2="72" gradientUnits="userSpaceOnUse">
          <stop stop-color="#818cf8"/>
          <stop offset="1" stop-color="#a78bfa"/>
        </linearGradient>
        <linearGradient id="slashGrad" x1="42" y1="22" x2="58" y2="78" gradientUnits="userSpaceOnUse">
          <stop stop-color="#a78bfa" stop-opacity="0.9"/>
          <stop offset="1" stop-color="#c4b5fd" stop-opacity="0.7"/>
        </linearGradient>
      </defs>
    </svg>
  </div>
  <h2>ClinearHub Code</h2>
</div>

<div class="icon-group">
  <div class="icon-cowork">
    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Main speech bubble (left, larger) -->
      <rect x="8" y="16" width="56" height="40" rx="10" fill="url(#bubbleMain)"/>
      <path d="M24 56L18 70L36 56" fill="url(#bubbleMain)"/>
      <!-- Reply speech bubble (right, smaller, overlapping) -->
      <rect x="40" y="38" width="52" height="34" rx="9" fill="url(#bubbleReply)"/>
      <path d="M72 72L78 84L62 72" fill="url(#bubbleReply)"/>
      <!-- Dots in main bubble -->
      <circle cx="24" cy="36" r="4" fill="rgba(109, 40, 217, 0.7)"/>
      <circle cx="36" cy="36" r="4" fill="rgba(109, 40, 217, 0.6)"/>
      <circle cx="48" cy="36" r="4" fill="rgba(109, 40, 217, 0.5)"/>
      <!-- Lines in reply bubble -->
      <line x1="50" y1="50" x2="82" y2="50" stroke="rgba(196, 181, 253, 0.8)" stroke-width="3.5" stroke-linecap="round"/>
      <line x1="50" y1="60" x2="72" y2="60" stroke="rgba(196, 181, 253, 0.5)" stroke-width="3.5" stroke-linecap="round"/>
      <defs>
        <linearGradient id="bubbleMain" x1="8" y1="16" x2="64" y2="56" gradientUnits="userSpaceOnUse">
          <stop stop-color="#e9e5ff"/>
          <stop offset="1" stop-color="#c4b5fd"/>
        </linearGradient>
        <linearGradient id="bubbleReply" x1="40" y1="38" x2="92" y2="72" gradientUnits="userSpaceOnUse">
          <stop stop-color="#8b5cf6"/>
          <stop offset="1" stop-color="#7c3aed"/>
        </linearGradient>
      </defs>
    </svg>
  </div>
  <h2>ClinearHub Cowork</h2>
</div>

</body>
</html>
