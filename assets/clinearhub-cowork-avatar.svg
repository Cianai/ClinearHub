<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2e1065"/>
      <stop offset="40%" stop-color="#4c1d95"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="bubbleMain" x1="20" y1="41" x2="164" y2="143" gradientUnits="userSpaceOnUse">
      <stop stop-color="#e9e5ff"/>
      <stop offset="1" stop-color="#c4b5fd"/>
    </linearGradient>
    <linearGradient id="bubbleReply" x1="102" y1="97" x2="236" y2="184" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="80%" r="50%">
      <stop offset="0%" stop-color="rgba(196, 181, 253, 0.1)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="256" height="256" rx="56" fill="url(#bg)"/>
  <rect width="256" height="256" rx="56" fill="url(#glow)"/>
  <!-- Main speech bubble (left, larger) -->
  <rect x="20" y="41" width="144" height="102" rx="26" fill="url(#bubbleMain)"/>
  <polygon points="62,143 46,179 92,143" fill="url(#bubbleMain)"/>
  <!-- Reply speech bubble (right, smaller, overlapping) -->
  <rect x="102" y="97" width="134" height="87" rx="23" fill="url(#bubbleReply)"/>
  <polygon points="184,184 200,215 159,184" fill="url(#bubbleReply)"/>
  <!-- Dots in main bubble -->
  <circle cx="62" cy="92" r="10" fill="rgba(109, 40, 217, 0.7)"/>
  <circle cx="92" cy="92" r="10" fill="rgba(109, 40, 217, 0.6)"/>
  <circle cx="122" cy="92" r="10" fill="rgba(109, 40, 217, 0.5)"/>
  <!-- Lines in reply bubble -->
  <line x1="128" y1="128" x2="210" y2="128" stroke="rgba(196, 181, 253, 0.8)" stroke-width="9" stroke-linecap="round"/>
  <line x1="128" y1="154" x2="184" y2="154" stroke="rgba(196, 181, 253, 0.5)" stroke-width="9" stroke-linecap="round"/>
</svg>
